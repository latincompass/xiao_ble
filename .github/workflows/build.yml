name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # 拉取ZMK依赖（若基于ZMK开发）
        with:
          submodules: recursive

      # 步骤1：安装编译依赖（ZMK/NRF52840）
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi python3 python3-pip
          pip3 install uf2conv  # 安装UF2转换工具

      # 步骤2：编译固件（生成.hex/.elf）
      - name: Build firmware
        run: |
          # 替换为你的实际编译命令（以west为例）
          west build -b xiao_ble/zmk . --pristine
          # 验证编译产物（可选）
          ls -la build/zephyr/ | grep -E "(hex|elf)"

      # 步骤3：将hex转换为UF2
      - name: Convert to UF2
        run: |
          # 转换命令（适配你的hex文件路径）
          uf2conv.py build/zephyr/zephyr.hex -c -o xiao_ble.zmk.uf2
          # 验证UF2生成
          ls -la | grep uf2

      # 步骤4：上传UF2产物（便于下载）
      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiao_ble-uf2-firmware
          path: ./xiao_ble.zmk.uf2
