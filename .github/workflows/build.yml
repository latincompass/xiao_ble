name: Build XIAO BLE ZMK Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取你的xiao_ble配置仓库
      - uses: actions/checkout@v4
        with:
          path: xiao_ble
          fetch-depth: 1

      # 步骤2：先安装所有依赖（含west），再处理ZMK仓库
      - name: Install build dependencies (including west)
        run: |
          sudo apt update && sudo apt install -y \
            gcc-arm-none-eabi \
            python3-pip \
            ninja-build \
            dfu-util \
            device-tree-compiler \
            libssl-dev \
            git \
            wget
          # 安装west工具（指定版本避免兼容性问题）
          pip3 install --user west==1.0.0
          # 立即加载west到环境变量（关键：解决command not found）
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # 验证west安装
          west --version

      # 步骤3：克隆ZMK核心仓库并初始化west环境
      - name: Clone ZMK core and init west
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/zmkfirmware/zmk.git
          cd zmk
          # 此时west已安装，可正常执行
          west init -l .
          west update --narrow -o=--depth=1
          west zephyr-export

      # 步骤4：复制XIAO BLE配置到ZMK
      - name: Copy XIAO BLE board config to ZMK
        run: |
          mkdir -p zmk/boards/arm/xiao_ble
          cp -r xiao_ble/board.yml zmk/boards/arm/xiao_ble/
          cp -r xiao_ble/xiao_ble.zmk.yml zmk/boards/arm/xiao_ble/

      # 步骤5：创建键盘布局和板型配置
      - name: Create ZMK keymap and config
        run: |
          mkdir -p zmk/app/boards/arm/xiao_ble
          mkdir -p zmk/app/src/keymaps/xiao_ble
          
          # 基础按键布局（ESC键测试）
          cat > zmk/app/src/keymaps/xiao_ble/keymap.dtsi << EOF
          #include <dt-bindings/zmk/keys.h>
          / {
              keymap {
                  compatible = "zmk,keymap";
                  default_layer {
                      bindings = <&kp ESC>;
                  };
              };
          };
          EOF
          
          # 板型配置（启用BLE+USB）
          cat > zmk/app/boards/arm/xiao_ble/xiao_ble.conf << EOF
          CONFIG_BT=y
          CONFIG_BT_PERIPHERAL=y
          CONFIG_ZMK_BLE=y
          CONFIG_USB=y
          CONFIG_USB_DEVICE=y
          CONFIG_ZMK_USB=y
          CONFIG_CONSOLE=y
          EOF

      # 步骤6：编译ZMK固件
      - name: Build ZMK firmware for XIAO BLE
        run: |
          cd zmk/app
          west build -b xiao_ble/zmk --pristine -- -DZMK_KEYMAP=xiao_ble

      # 步骤7：转换为UF2格式（便于刷入XIAO BLE）
      - name: Convert firmware to UF2
        run: |
          wget https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -O uf2conv.py
          chmod +x uf2conv.py
          python3 uf2conv.py zmk/app/build/zephyr/zephyr.hex -c -o xiao_ble-zmk.uf2

      # 步骤8：上传固件产物
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiao_ble-zmk-firmware
          path: |
            xiao_ble-zmk.uf2
            zmk/app/build/zephyr/zephyr.hex
            zmk/app/build/zephyr/zephyr.elf
