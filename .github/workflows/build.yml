name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # 拉取ZMK子模块（关键，否则编译会失败）

      # 安装编译依赖 + UF2转换工具
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi python3 python3-pip git
          # 下载官方uf2conv.py工具
          wget https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -O /usr/local/bin/uf2conv.py
          chmod +x /usr/local/bin/uf2conv.py
          # 安装ZMK依赖（若需要）
          pip3 install west

      # 初始化ZMK编译环境（关键，ZMK必须先初始化west）
      - name: Init ZMK west environment
        run: |
          west init -l .
          west update
          west zephyr-export

      # 编译固件（生成hex/elf）
      - name: Build firmware
        run: |
          west build -b xiao_ble/zmk . --pristine
          # 验证编译产物
          ls -la build/zephyr/ | grep -E "(hex|elf)"

      # 转换为UF2
      - name: Convert to UF2
        run: |
          python3 /usr/local/bin/uf2conv.py build/zephyr/zephyr.hex -c -o xiao_ble.zmk.uf2
          ls -la | grep uf2

      # 上传UF2产物
      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiao_ble-uf2-firmware
          path: ./xiao_ble.zmk.uf2
